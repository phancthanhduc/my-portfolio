version: '3.8'

services:
  # Development environment
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: portfolio-dev
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  # Production preview
  preview:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-preview
    ports:
      - "4173:5173"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

networks:
  default:
    name: portfolio-network
